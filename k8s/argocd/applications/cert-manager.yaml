apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.jetstack.io
    targetRevision: v1.14.4
    chart: cert-manager
    helm:
      parameters:
        - name: installCRDs
          value: "true"    
        - name: webhook.livenessProbe.timeoutSeconds
          value: "10"
        - name: webhook.readinessProbe.timeoutSeconds
          value: "10"
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true