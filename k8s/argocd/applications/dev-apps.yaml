apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: laptopai-backend-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/qwerttt0745/LaptopAI
    targetRevision: HEAD
    path: k8s/helm/backend
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
