# helm/monitoring/values.yaml

kube-prometheus-stack: # ВАЖЛИВО: все має бути з відступом під цим ключем!
  
  defaultRules:
    create: false

  alertmanager:
    enabled: false

  grafana:
    enabled: true
    resources:
      requests:
        memory: 100Mi
        cpu: 50m
      limits:
        memory: 150Mi
        cpu: 200m

  kubeStateMetrics:
    enabled: false

  prometheus-node-exporter:
    enabled: true
    resources:
      requests:
        memory: 30Mi
      limits:
        memory: 50Mi

  prometheus:
    prometheusSpec:
      retention: 24h
      resources:
        requests:
          memory: 150Mi
          cpu: 50m
        limits:
          memory: 250Mi
          cpu: 300m