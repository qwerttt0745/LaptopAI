image:
  repository: 968909453204.dkr.ecr.eu-central-1.amazonaws.com/laptopai-frontend
  tag: dd1ea83d086ce87a4b714545a9715e1043c772f0

replicaCount: 1
namespace: dev
backendUrl: "http://backend:8000"  # For server-side requests

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: laptopai.dev
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: laptopai-tls-secret
      hosts:
        - laptopai.dev