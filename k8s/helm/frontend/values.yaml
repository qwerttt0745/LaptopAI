image:
  repository: 968909453204.dkr.ecr.eu-central-1.amazonaws.com/laptopai-frontend
  tag: ff135b1d04e423eb370f6a783823f8488d0b548a

replicaCount: 1
namespace: dev
backendUrl: "http://backend:8000"  # For server-side requests

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: devopsai.dev
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: devopsai-tls-secret
      hosts:
        - devopsai.dev