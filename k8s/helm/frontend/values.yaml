image:
  repository: 968909453204.dkr.ecr.eu-central-1.amazonaws.com/laptopai-frontend
  tag: 363bc59bfeac0f3d98f9552993c07acbfa6680a6

replicaCount: 1
namespace: dev
backendUrl: "http://backend:8000"  # For server-side requests
apiUrl: "https://api.laptopai.dev"  # For browser requests
publicIp: "3.123.223.58"

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: laptopai.dev
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: laptopai-tls-secret
      hosts:
        - laptopai.dev