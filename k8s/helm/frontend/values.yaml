image:
  repository: 968909453204.dkr.ecr.eu-central-1.amazonaws.com/laptopai-frontend
  tag: 929aa9c6521e45d09c749c5dca46a4a8291fa9e7

replicaCount: 1
namespace: dev
backendUrl: "http://backend:8000"  # For server-side requests

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: devopsai.dev
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: devopsai-tls-secret
      hosts:
        - devopsai.dev