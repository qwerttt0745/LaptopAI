name: CI

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [develop]

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'

jobs:

  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linters
        run: pip install black==24.2.0 pylint

      - name: Check formatting
        run: black --check backend/app ai-service/app

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Install ai-service dependencies
        run: pip install -r ai-service/requirements.txt

      - name: Run pylint backend
        run: pylint backend/app --fail-under=7 --disable=C0114,C0115,C0116

      - name: Run pylint ai-service
        run: pylint ai-service/app --fail-under=7 --disable=C0114,C0115,C0116

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

  test-backend:
    runs-on: ubuntu-latest
    needs: lint-backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: laptopai_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('backend/requirements.txt') }}

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:testpassword@localhost:5432/laptopai_test
          REDIS_URL: redis://localhost:6379
          AI_SERVICE_URL: http://localhost:8001
        run: |
          pytest app/tests/ -v \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml

  build-and-push:
    runs-on: ubuntu-latest
    needs: [test-backend, lint-frontend]
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: [backend, ai-service, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          SHA: ${{ github.sha }}
        run: |
          docker build \
            --cache-from $REGISTRY/laptopai-${{ matrix.service }}:latest \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            -t $REGISTRY/laptopai-${{ matrix.service }}:$SHA \
            -t $REGISTRY/laptopai-${{ matrix.service }}:latest \
            ./${{ matrix.service }}
          docker push $REGISTRY/laptopai-${{ matrix.service }}:$SHA
          docker push $REGISTRY/laptopai-${{ matrix.service }}:latest
  
  security-scan:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: [backend, ai-service, frontend]
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Scan image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/laptopai-${{ matrix.service }}:latest
          severity: CRITICAL
          exit-code: 1
          ignore-unfixed: true

  update-helm:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Update image tags
        env:
          SHA: ${{ github.sha }}
        run: |
          sed -i "s/tag:.*/tag: $SHA/" k8s/helm/backend/values.yaml
          sed -i "s/tag:.*/tag: $SHA/" k8s/helm/ai-service/values.yaml
          sed -i "s/tag:.*/tag: $SHA/" k8s/helm/frontend/values.yaml
          git config user.email "ci@laptopai.dev"
          git config user.name "GitHub Actions"
          git add k8s/helm/backend/values.yaml k8s/helm/ai-service/values.yaml k8s/helm/frontend/values.yaml
          git diff --staged --quiet || git commit -m "ci: update image tags to $SHA [skip ci]"
          git push