name: Direct CD to Kubernetes

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_BACKEND_REPOSITORY: ${{ secrets.ECR_BACKEND_REPOSITORY }}
  ECR_FRONTEND_REPOSITORY: ${{ secrets.ECR_FRONTEND_REPOSITORY }}
  ECR_AI_SERVICE_REPOSITORY: ${{ secrets.ECR_AI_SERVICE_REPOSITORY }}
  K8S_NAMESPACE: dev
  BACKEND_DEPLOYMENT: backend
  BACKEND_CONTAINER: backend
  FRONTEND_DEPLOYMENT: frontend
  FRONTEND_CONTAINER: frontend
  AI_SERVICE_DEPLOYMENT: ai-service
  AI_SERVICE_CONTAINER: ai-service

jobs:
  build-push-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t "$REGISTRY/$ECR_BACKEND_REPOSITORY:$IMAGE_TAG" \
            -t "$REGISTRY/$ECR_BACKEND_REPOSITORY:latest" \
            ./backend

          docker push "$REGISTRY/$ECR_BACKEND_REPOSITORY:$IMAGE_TAG"
          docker push "$REGISTRY/$ECR_BACKEND_REPOSITORY:latest"

      - name: Build and push frontend image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t "$REGISTRY/$ECR_FRONTEND_REPOSITORY:$IMAGE_TAG" \
            -t "$REGISTRY/$ECR_FRONTEND_REPOSITORY:latest" \
            ./frontend

          docker push "$REGISTRY/$ECR_FRONTEND_REPOSITORY:$IMAGE_TAG"
          docker push "$REGISTRY/$ECR_FRONTEND_REPOSITORY:latest"

      - name: Build and push AI service image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t "$REGISTRY/$ECR_AI_SERVICE_REPOSITORY:$IMAGE_TAG" \
            -t "$REGISTRY/$ECR_AI_SERVICE_REPOSITORY:latest" \
            ./ai-service

          docker push "$REGISTRY/$ECR_AI_SERVICE_REPOSITORY:$IMAGE_TAG"
          docker push "$REGISTRY/$ECR_AI_SERVICE_REPOSITORY:latest"

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Deploy to Kubernetes using Helm
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -euo pipefail

          # Ensure target namespace exists
          kubectl create namespace "$K8S_NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -

          # Ensure AI service secret exists
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "GEMINI_API_KEY GitHub secret is not set"
            exit 1
          fi

          kubectl -n "$K8S_NAMESPACE" create secret generic manual-ai-secrets \
            --from-literal=GEMINI_API_KEY="$GEMINI_API_KEY" \
            --dry-run=client -o yaml | kubectl apply -f -

          # Deploy backend chart
          helm upgrade --install "$BACKEND_DEPLOYMENT" ./k8s/helm/backend \
            --namespace "$K8S_NAMESPACE" \
            --set image.repository="$REGISTRY/$ECR_BACKEND_REPOSITORY" \
            --set image.tag="$IMAGE_TAG"

          # Deploy frontend chart
          helm upgrade --install "$FRONTEND_DEPLOYMENT" ./k8s/helm/frontend \
            --namespace "$K8S_NAMESPACE" \
            --set image.repository="$REGISTRY/$ECR_FRONTEND_REPOSITORY" \
            --set image.tag="$IMAGE_TAG"

          # Deploy AI service chart
          helm upgrade --install "$AI_SERVICE_DEPLOYMENT" ./k8s/helm/ai-service \
            --namespace "$K8S_NAMESPACE" \
            --set image.repository="$REGISTRY/$ECR_AI_SERVICE_REPOSITORY" \
            --set image.tag="$IMAGE_TAG"

          # Wait for successful rollouts
          kubectl -n "$K8S_NAMESPACE" rollout status deployment/"$BACKEND_DEPLOYMENT" --timeout=180s
          kubectl -n "$K8S_NAMESPACE" rollout status deployment/"$FRONTEND_DEPLOYMENT" --timeout=180s
          kubectl -n "$K8S_NAMESPACE" rollout status deployment/"$AI_SERVICE_DEPLOYMENT" --timeout=300s

      - name: Debug rollout failure
        if: failure()
        run: |
          set -euo pipefail
          kubectl -n "$K8S_NAMESPACE" get pods -o wide
          kubectl -n "$K8S_NAMESPACE" describe deployment "$AI_SERVICE_DEPLOYMENT" || true
          kubectl -n "$K8S_NAMESPACE" describe pods -l app="$AI_SERVICE_DEPLOYMENT" || true
          kubectl -n "$K8S_NAMESPACE" logs deployment/"$AI_SERVICE_DEPLOYMENT" --all-containers --tail=200 || true
          kubectl -n "$K8S_NAMESPACE" get events --sort-by=.metadata.creationTimestamp | tail -n 100 || true